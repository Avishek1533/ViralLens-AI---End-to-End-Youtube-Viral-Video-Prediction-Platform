version: '3.8'

services:
  virallens-api:
    build: .
    container_name: virallens-ai-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - virallens-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:latest
    container_name: virallens-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - virallens-api
    networks:
      - virallens-network
    restart: unless-stopped

networks:
  virallens-network:
    driver: bridge
